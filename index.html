<!DOCTYPE html>
<html>
<head>
<title>Pinterest Downloader</title>
</head>

<body style="font-family:Arial;text-align:center;padding:50px">

<h2>Pinterest Video Downloader</h2>

<input id="url" placeholder="Paste Pinterest link" style="width:300px;padding:10px">

<br><br>

<button onclick="download()">Download</button>

<div id="result"></div>

<script>

async function download(){

let link=document.getElementById("url").value;

let res=await fetch("https://your-app.onrender.com/api?url="+encodeURIComponent(link));

let data=await res.json();

if(data.video){

document.getElementById("result").innerHTML=
`<br><a href="${data.video}" target="_blank">Download Video</a>`;

}else{

document.getElementById("result").innerHTML="Pin not found";

}

}

</script>

</body>
</html>
